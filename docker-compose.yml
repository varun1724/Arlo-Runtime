services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arlo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arlo_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-arlo}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-n8n-db.sql:/docker-entrypoint-initdb.d/init-n8n-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arlo}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - workspaces:/workspaces

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - workspaces:/workspaces

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-arlo}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-arlo_dev_password}
      - N8N_API_KEY=${N8N_API_KEY:-arlo-n8n-dev-key}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  workspaces:
  n8n_data:
